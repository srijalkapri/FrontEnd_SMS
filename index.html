<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Management</title>
    <script>
      (function () {
        var mode = localStorage.getItem('theme-mode') || localStorage.getItem('theme');
        if (mode !== 'light' && mode !== 'dark') {
          mode = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        var accent = localStorage.getItem('theme-accent') || 'indigo';
        document.documentElement.setAttribute('data-mode', mode);
        document.documentElement.setAttribute('data-theme', mode);
        document.documentElement.setAttribute('data-accent', accent);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marcellus&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
